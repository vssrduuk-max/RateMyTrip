<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ff6b6b" />
  <meta name="description" content="Community-gedreven reisaanbevelingen met swipe, kaart en chat." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Travel MVP" />
  <meta property="og:description" content="Vind reis-tips van gelijkgestemden. Swipe, kaart en chat." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Travel MVP</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    :root{--bg:#0b1220;--muted:#9ab0cf;--text:#eaf2ff;--accent:#ff6b6b;--border:rgba(255,255,255,.10);--shadow:0 14px 40px rgba(0,0,0,.38)}
    *{box-sizing:border-box}html,body{height:100%}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--text);
      background:radial-gradient(1000px 700px at 10% -10%, rgba(255,107,107,.26), transparent 62%),var(--bg)}
    a{color:inherit}button,input,select,textarea{font:inherit}
    .topbar{position:sticky;top:0;z-index:30;backdrop-filter:blur(12px);background:rgba(11,18,32,.78);border-bottom:1px solid var(--border)}
    .container{max-width:1100px;margin:0 auto;padding:16px}
    .hero{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .brand{display:flex;gap:10px;align-items:center}.logo{width:34px;height:34px;border-radius:10px;background:var(--accent);box-shadow:var(--shadow)}
    .muted{color:var(--muted)}.small{font-size:12px}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .nav button{border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);padding:10px 12px;border-radius:14px;cursor:pointer}
    .nav button[aria-current='page']{border-color:rgba(255,107,107,.6);background:rgba(255,107,107,.12)}
    .card{border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
    .cardHd{padding:14px 14px 0}.cardBd{padding:14px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.spacer{flex:1}
    .btn{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);padding:10px 12px;border-radius:14px;cursor:pointer}
    .btnPrimary{background:rgba(255,107,107,.18);border-color:rgba(255,107,107,.55)}
    .pill{padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.03)}
    .input{width:100%;padding:10px 12px;border-radius:14px;border:1px solid var(--border);background:rgba(0,0,0,.18);color:var(--text)}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:900px){.grid{grid-template-columns:1.2fr .8fr}}
    .placeImg{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:rgba(255,255,255,.04)}
    .toast{position:fixed;left:16px;right:16px;bottom:16px;max-width:560px;margin:0 auto;padding:12px 14px;border-radius:16px;border:1px solid var(--border);background:rgba(18,26,42,.92);box-shadow:var(--shadow)}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="hero">
        <div class="brand" aria-label="Travel MVP">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <div style="font-weight:900;letter-spacing:.2px">Travel MVP</div>
            <div class="muted small">Discovery • Swipe • Kaart • Profiel • Chat • PWA</div>
          </div>
        </div>
        <div class="row"><span id="authState" class="pill small">Hallo, Gast</span></div>
      </div>
      <nav class="nav" aria-label="Hoofdnavigatie">
        <button data-route="discovery" aria-current="page">Discovery</button>
        <button data-route="swipe">Swipe</button>
        <button data-route="map">Kaart</button>
        <button data-route="profile">Profiel</button>
        <button data-route="chats">Chats</button>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top:16px">
    <div id="view"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" style="display:none"></div>
  <div id="modalRoot"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}) })
    }

    const qs = (s, el=document) => el.querySelector(s)
    const qsa = (s, el=document) => [...el.querySelectorAll(s)]
    const uid = () => Math.random().toString(16).slice(2) + Date.now().toString(16)

    function toast(msg){
      const el = qs('#toast')
      el.textContent = msg
      el.style.display = 'block'
      clearTimeout(window.__toastTimer)
      window.__toastTimer = setTimeout(() => { el.style.display = 'none' }, 3200)
    }

    /* ── Mock Data ── */
    const PLACES = [
      {id:'p1',name:'Santorini Sunset',loc:'Griekenland',lat:36.3932,lng:25.4615,img:'https://placehold.co/600x380/264653/eaf2ff?text=Santorini',tags:['strand','romantisch'],desc:'Iconische witte huisjes en een ongelooflijke zonsondergang boven de caldera.'},
      {id:'p2',name:'Kyoto Temples',loc:'Japan',lat:35.0116,lng:135.7681,img:'https://placehold.co/600x380/2a9d8f/eaf2ff?text=Kyoto',tags:['cultuur','natuur'],desc:'Duizenden torii-poorten, bamboo-bossen en serene theehuizen.'},
      {id:'p3',name:'Banff National Park',loc:'Canada',lat:51.4968,lng:-115.9281,img:'https://placehold.co/600x380/e76f51/eaf2ff?text=Banff',tags:['avontuur','bergen'],desc:'Turkooizen meren omringd door de Canadese Rocky Mountains.'},
      {id:'p4',name:'Marrakech Medina',loc:'Marokko',lat:31.6295,lng:-7.9811,img:'https://placehold.co/600x380/e9c46a/264653?text=Marrakech',tags:['cultuur','eten'],desc:'Levendige souks, specerijen en riads met verborgen binnenplaatsen.'},
      {id:'p5',name:'Amalfi Coast',loc:'Italië',lat:40.6333,lng:14.6029,img:'https://placehold.co/600x380/f4a261/264653?text=Amalfi',tags:['strand','eten'],desc:'Kleurrijke dorpjes geplakt op kliffen boven de azuurblauwe zee.'},
      {id:'p6',name:'Reykjavik & Golden Circle',loc:'IJsland',lat:64.1466,lng:-21.9426,img:'https://placehold.co/600x380/457b9d/eaf2ff?text=IJsland',tags:['avontuur','natuur'],desc:'Geisers, watervallen en het noorderlicht in één reis.'},
    ]

    const CHATS = [
      {id:'c1',name:'Sarah',avatar:'S',msgs:[{from:'them',text:'Hey! Ben je al in Kyoto geweest?'},{from:'me',text:'Nee, staat op mijn lijst!'},{from:'them',text:'Je moet zeker Fushimi Inari doen, het is magisch.'}]},
      {id:'c2',name:'Marco',avatar:'M',msgs:[{from:'them',text:'Amalfi is prachtig, laat je tips sturen!'},{from:'me',text:'Graag! Welk seizoen is het best?'}]},
    ]

    let saved = JSON.parse(sessionStorage.getItem('saved')||'[]')
    let currentRoute = 'discovery'
    let swipeIdx = 0
    let currentChat = null

    function persist(){ sessionStorage.setItem('saved', JSON.stringify(saved)) }

    /* ── Router ── */
    function go(route){
      currentRoute = route
      qsa('.nav button').forEach(b => b.setAttribute('aria-current', b.dataset.route === route ? 'page' : 'false'))
      render()
    }
    qsa('.nav button').forEach(b => b.addEventListener('click', () => go(b.dataset.route)))

    /* ── Renderers ── */
    function render(){
      const v = qs('#view')
      switch(currentRoute){
        case 'discovery': v.innerHTML = renderDiscovery(); break
        case 'swipe': v.innerHTML = renderSwipe(); bindSwipe(); break
        case 'map': v.innerHTML = '<div id="mapEl" style="height:70vh;border-radius:18px;overflow:hidden;border:1px solid var(--border)"></div>'; initMap(); break
        case 'profile': v.innerHTML = renderProfile(); break
        case 'chats': v.innerHTML = currentChat ? renderChatDetail() : renderChatList(); bindChat(); break
      }
    }

    /* Discovery */
    function renderDiscovery(){
      return '<div class="grid">' + PLACES.map(p => `
        <div class="card">
          <img class="placeImg" src="${p.img}" alt="${p.name}" loading="lazy"/>
          <div class="cardBd">
            <h3 style="margin:0">${p.name}</h3>
            <p class="muted small" style="margin:4px 0">${p.loc} — ${p.tags.map(t=>'<span class="pill small" style="margin-right:4px">'+t+'</span>').join('')}</p>
            <p style="margin:6px 0;font-size:14px">${p.desc}</p>
            <div class="row" style="margin-top:8px">
              <button class="btn btnPrimary" onclick="toggleSave('${p.id}')">${saved.includes(p.id)?'✓ Opgeslagen':'Opslaan'}</button>
            </div>
          </div>
        </div>`).join('') + '</div>'
    }
    function toggleSave(id){
      if(saved.includes(id)){saved=saved.filter(s=>s!==id);toast('Verwijderd')}else{saved.push(id);toast('Opgeslagen!')}
      persist(); render()
    }

    /* Swipe */
    function renderSwipe(){
      const p = PLACES[swipeIdx % PLACES.length]
      return `<div class="card" style="max-width:420px;margin:0 auto">
        <img class="placeImg" src="${p.img}" alt="${p.name}"/>
        <div class="cardBd" style="text-align:center">
          <h3 style="margin:0">${p.name}</h3>
          <p class="muted small">${p.loc}</p>
          <p style="font-size:14px">${p.desc}</p>
          <div class="row" style="justify-content:center;margin-top:12px">
            <button class="btn" id="swipeLeft" style="font-size:22px;padding:10px 20px">✗</button>
            <button class="btn btnPrimary" id="swipeRight" style="font-size:22px;padding:10px 20px">♥</button>
          </div>
          <p class="muted small" style="margin-top:8px">${swipeIdx+1} / ${PLACES.length}</p>
        </div>
      </div>`
    }
    function bindSwipe(){
      const l=qs('#swipeLeft'),r=qs('#swipeRight')
      if(l) l.onclick=()=>{swipeIdx++;toast('Overgeslagen');render()}
      if(r) r.onclick=()=>{const p=PLACES[swipeIdx%PLACES.length];if(!saved.includes(p.id)){saved.push(p.id);persist()};swipeIdx++;toast('Liked & opgeslagen!');render()}
    }

    /* Map */
    function initMap(){
      setTimeout(()=>{
        const m = L.map('mapEl').setView([40,10],3)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m)
        PLACES.forEach(p=>{
          L.marker([p.lat,p.lng]).addTo(m).bindPopup(`<strong>${p.name}</strong><br>${p.loc}<br><em>${p.desc.slice(0,80)}…</em>`)
        })
      },80)
    }

    /* Profile */
    function renderProfile(){
      const s = PLACES.filter(p=>saved.includes(p.id))
      return `<div class="card" style="max-width:520px">
        <div class="cardBd">
          <h3 style="margin:0">Mijn Profiel</h3>
          <p class="muted small">Demo-gebruiker • ${saved.length} opgeslagen bestemmingen</p>
          <hr style="border-color:var(--border)"/>
          <h4 style="margin:10px 0 6px">Opgeslagen bestemmingen</h4>
          ${s.length?s.map(p=>`<div class="row" style="margin-bottom:8px"><img src="${p.img}" style="width:60px;height:40px;object-fit:cover;border-radius:8px"/><div><strong>${p.name}</strong><br><span class="muted small">${p.loc}</span></div><div class="spacer"></div><button class="btn small" onclick="toggleSave('${p.id}')">✗</button></div>`).join(''):'<p class="muted small">Nog niets opgeslagen. Ga naar Discovery of Swipe!</p>'}
        </div>
      </div>`
    }

    /* Chats */
    function renderChatList(){
      currentChat=null
      return `<div class="card" style="max-width:520px"><div class="cardBd">
        <h3 style="margin:0 0 10px">Chats</h3>
        ${CHATS.map(c=>`<div class="row" style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="currentChat='${c.id}';render()">
          <div style="width:38px;height:38px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700">${c.avatar}</div>
          <div><strong>${c.name}</strong><br><span class="muted small">${c.msgs[c.msgs.length-1].text.slice(0,40)}…</span></div>
        </div>`).join('')}
      </div></div>`
    }
    function renderChatDetail(){
      const c = CHATS.find(x=>x.id===currentChat)
      if(!c) return renderChatList()
      return `<div class="card" style="max-width:520px"><div class="cardBd">
        <div class="row"><button class="btn small" onclick="currentChat=null;render()">← Terug</button><strong style="margin-left:8px">${c.name}</strong></div>
        <div style="margin:12px 0;max-height:50vh;overflow-y:auto">
          ${c.msgs.map(m=>`<div style="text-align:${m.from==='me'?'right':'left'};margin:6px 0">
            <span style="display:inline-block;padding:8px 12px;border-radius:14px;max-width:80%;background:${m.from==='me'?'rgba(255,107,107,.18)':'rgba(255,255,255,.06)'}">${m.text}</span>
          </div>`).join('')}
        </div>
        <div class="row"><input class="input" id="chatInput" placeholder="Typ een bericht…"/><button class="btn btnPrimary" id="chatSend">Stuur</button></div>
      </div></div>`
    }
    function bindChat(){
      const btn=qs('#chatSend'),inp=qs('#chatInput')
      if(!btn||!inp) return
      const send=()=>{
        const t=inp.value.trim(); if(!t) return
        const c=CHATS.find(x=>x.id===currentChat); if(!c) return
        c.msgs.push({from:'me',text:t}); inp.value=''
        setTimeout(()=>{c.msgs.push({from:'them',text:'Leuk! Daar weet ik meer over 😊'});render()},900)
        render()
      }
      btn.onclick=send
      inp.onkeydown=e=>{if(e.key==='Enter')send()}
    }

    /* Boot */
    render()
  </script>
</body>
</html>
